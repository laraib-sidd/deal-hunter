name: Build & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/laraib-sidd/deal-hunter

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Run tests in container
        run: |
          docker run --rm --entrypoint pytest ${{ env.IMAGE }}:${{ github.sha }} \
            tests/ --tb=short -q
